<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Attendance - Attendly</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body class="bg-bg min-h-screen">
    <div class="layout-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar-container bg-slate-900">
            <div class="p-6 pb-8 text-xl font-bold tracking-tight flex items-center gap-3">
                <span class="text-accent underline decoration-4 underline-offset-4">◈</span> Attendly
            </div>
            <nav class="flex-1">
                <a href="student_dashboard.html" class="sidebar-link">
                    <i data-lucide="layout-grid" class="w-4 h-4"></i> My Dashboard
                </a>
                <a href="student_attendance.html" class="sidebar-link active">
                    <i data-lucide="check-circle" class="w-4 h-4"></i> My Attendance
                </a>
            </nav>
            <div class="p-6 mt-auto border-t border-white/10">
                <div class="text-[10px] text-slate-500 font-bold uppercase mb-1">Logged in as</div>
                <div class="text-sm font-semibold truncate italic text-blue-100 user-display-name sidebar-user">John Doe (CS001)</div>
            </div>
        </aside>

        <div class="main-viewport">
            <header class="top-navbar">
                <div>
                    <h2 class="text-lg font-bold tracking-tight">Subject Attendance</h2>
                    <p class="text-[11px] text-text-muted font-medium uppercase tracking-wider">Detailed breakdown</p>
                </div>
                <a href="index.html" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center border border-border hover:bg-slate-200 transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4 text-text-muted"></i>
                </a>
            </header>

            <main class="p-8 space-y-8">
                <div class="grid grid-cols-1 gap-4" id="student-attendance-list">
                    <!-- High density list items -->
                </div>

                <div class="table-wrapper">
                    <div class="p-4 bg-slate-50 border-b border-border">
                        <h3 class="text-sm font-bold text-text-main uppercase tracking-tight">Record History</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="density-table">
                            <thead>
                                <tr>
                                    <th>Subject</th>
                                    <th class="text-center">Total Classes</th>
                                    <th class="text-center">Attended</th>
                                    <th class="text-right">Percentage</th>
                                </tr>
                            </thead>
                            <tbody id="student-attendance-table">
                                <!-- Rows injected via script -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>


    <script type="module" src="./src/script.js"></script>
    <script>
        function renderStudentAttendance() {
            // Find logged in student by Roll No
            const rollNo = localStorage.getItem('userRollNo');
            const student = window.appState.students.find(s => s.rollNo === rollNo) || window.appState.students[0];
            
            const listContainer = document.getElementById('student-attendance-list');
            const tableContainer = document.getElementById('student-attendance-table');
            
            let listHtml = '';
            let tableHtml = '';
            
            student.attendanceData.forEach(item => {
                const isSafe = item.percent >= 75;
                const statusColor = isSafe ? 'text-green-600' : 'text-red-600';
                const statusBg = isSafe ? 'bg-green-600' : 'bg-red-600';
                
                listHtml += `
                    <div class="card flex flex-col md:flex-row justify-between items-center gap-6 p-6">
                        <div class="text-center md:text-left space-y-1">
                            <h3 class="font-bold text-slate-800 text-lg">${item.subject}</h3>
                            <p class="text-sm text-slate-500">${item.attended} of ${item.total} classes attended</p>
                        </div>
                        <div class="w-full md:w-64 space-y-2">
                            <div class="flex justify-between items-baseline">
                                <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Progress</span>
                                <span class="text-lg font-black ${statusColor}">${item.percent}%</span>
                            </div>
                            <div class="w-full bg-slate-100 rounded-full h-2.5">
                                <div class="${statusBg} h-2.5 rounded-full transition-all duration-1000" style="width: ${item.percent}%"></div>
                            </div>
                        </div>
                    </div>
                `;
                
                tableHtml += `
                    <tr>
                        <td class="px-6 py-4 font-medium text-slate-800">${item.subject}</td>
                        <td class="px-6 py-4 text-center text-slate-600 font-mono">${item.total}</td>
                        <td class="px-6 py-4 text-center text-slate-600 font-mono">${item.attended}</td>
                        <td class="px-6 py-4 text-right">
                            <span class="inline-flex items-center gap-1.5 font-bold ${statusColor}">
                                <span class="w-2 h-2 rounded-full ${statusBg}"></span>
                                ${item.percent}%
                            </span>
                        </td>
                    </tr>
                `;
            });
            
            listContainer.innerHTML = listHtml;
            tableContainer.innerHTML = tableHtml;
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderStudentAttendance();
            window.updateUserDisplay();
        });
        lucide.createIcons();
    </script>
</body>
</html>
