<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Attendly</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-900/40 p-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-2xl p-10 space-y-8">
            <div class="text-center space-y-2">
                <h1 class="text-xl font-extrabold text-slate-900">Student Portal</h1>
                <p class="text-text-muted text-sm uppercase tracking-tight font-medium">Personal Academic Records</p>
            </div>

            <form class="space-y-4" onsubmit="handleLogin(event, 'student')">
                <div class="space-y-1.5">
                    <label class="text-[11px] font-bold uppercase text-text-muted">Enrollment ID (Roll Number)</label>
                    <input type="text" class="w-full px-3 py-2 border border-border rounded text-[13px] focus:outline-accent" placeholder="e.g. CS001" required>
                </div>
                <div class="space-y-1.5">
                    <label class="text-[11px] font-bold uppercase text-text-muted">Student Email</label>
                    <input type="email" class="w-full px-3 py-2 border border-border rounded text-[13px] focus:outline-accent" placeholder="student@university.edu" required>
                </div>
                <div class="space-y-1.5">
                    <label class="text-[11px] font-bold uppercase text-text-muted">Password</label>
                    <input type="password" class="w-full px-3 py-2 border border-border rounded text-[13px] focus:outline-accent" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-accent w-full py-3 mt-4">
                    Access My Records
                </button>
            </form>
            
            <div class="pt-6 border-t border-border flex justify-between items-center">
                <a href="index.html" class="text-[11px] font-bold uppercase text-text-muted hover:text-accent flex items-center gap-1">
                    <i data-lucide="chevron-left" class="w-3 h-3"></i> Back
                </a>
                <p class="text-[10px] text-text-muted">Public Access Terminal</p>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="./src/script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
